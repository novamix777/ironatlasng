<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización en Curso - Iron Atlas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Fondo con ambiente de servidor / líneas de datos sutiles */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 18, 24, 0.85), rgba(11, 12, 16, 0.95)),
                        radial-gradient(circle at 80% 20%, rgba(255, 0, 0, 0.05), transparent 40%);
            z-index: 1;
        }

        .main-panel {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 850px;
            background: linear-gradient(145deg, #16181f, #111217);
            border: 2px solid #222530;
            border-radius: 12px;
            padding: 4rem 2rem 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Decoración de tornillos industriales en las esquinas */
        .main-panel::before, .main-panel::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #3a3f50;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }
        .main-panel::before { top: 15px; left: 15px; }
        .main-panel::after { top: 15px; right: 15px; }

        /* Icono de Calavera Estilizada en Metal */
        .logo-container {
            margin-bottom: 2.5rem;
        }

        .skull-icon {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #2d313f 0%, #171921 100%);
            border: 2px solid #4a5166;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Texto Principal - Neón Rojo Potente */
        h1 {
            font-size: 2.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6),
                         0 0 25px rgba(255, 51, 51, 0.4),
                         0 0 50px rgba(255, 51, 51, 0.2);
            line-height: 1.3;
            margin-bottom: 1.5rem;
            animation: pulse-glow 2.5s infinite ease-in-out;
        }

        .divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4a5166, transparent);
            margin: 0 auto 1.5rem auto

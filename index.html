<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización en curso</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d11;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 3rem 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .pulse-orbit {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-circle {
            width: 24px;
            height: 24px;
            background-color: #3b82f6; /* Azul suave, cámbialo por #ff3333 si prefieres rojo */
            border-radius: 50%;
            box-shadow: 0 0 20px #3b82f6;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
                box-shadow: 0 0 10px #3b82f6;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 25px #3b82f6;
            }
            100% {
                transform: scale(0.9);
                opacity: 0.6;
                box-shadow: 0 0 10px #3b82f6;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-box">
            <div class="pulse-orbit">
                <div class="pulse-circle"></div>
            </div>
            <h1>Actualización en curso</h1>
            <p>Estamos optimizando la plataforma y mejorando la infraestructura para ofrecer un mejor rendimiento. Volveremos a estar en línea pronto.</p>
        </div>
    </div>

</body>
</html>
